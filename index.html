<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amanda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #d9deff;
    --card-bg: rgba(255, 255, 255, 0.5);
    --text: #8a4632;
    --accent: #8a4632;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: Georgia, "Playfair Display", "Times New Roman", serif;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 360px;
    text-align: center;
  }

  .avatar {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #ffffff;
    box-shadow: 0 6px 18px rgba(0,0,0,0.15);
  }

  h1 {
    color: var(--text);
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 0.3px;
    margin: 24px 0 10px;
  }

  p.tagline {
    color: var(--text);
    font-family: "Jost", "Helvetica Neue", Arial, sans-serif;
    font-style: normal;
    font-weight: 400;
    font-size: 12px;
    margin: 0 0 40px;
    letter-spacing: 0.3px;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  a.link {
    display: block;
    background: var(--card-bg);
    color: var(--text);
    text-decoration: none;
    font-family: "Jost", "Helvetica Neue", Arial, sans-serif;
    font-weight: 400;
    font-size: 12px;
    padding: 16px 20px;
    border-radius: 12px;
    letter-spacing: 0.3px;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
  }

  a.link-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  a.link:hover {
    transform: translateY(-2px);
    background: var(--accent);
    color: #ffffff;
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
  }

  footer {
    margin-top: 32px;
    color: var(--text);
    opacity: 0.7;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="card">
    <img class="avatar" src="avatar.jpg" alt="Amanda">
    <h1>Amanda</h1>
    <p class="tagline">welcome to my corner of the internet</p>
    <div class="links">
      <a class="link" href="http://mandymakes.uk" target="_blank" rel="noopener">mandymakes.uk</a>
      <a class="link link-icon" href="https://instagram.com/mandiontheblock" target="_blank" rel="noopener">
        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="2" y="2" width="20" height="20" rx="5" stroke="currentColor" stroke-width="2"/>
          <circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="2"/>
          <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor"/>
        </svg>
        @mandiontheblock
      </a>
      <a class="link" href="mailto:amanda.wahlqvist@gmail.com">say hello</a>
    </div>
    <footer>by Amanda Wahlqvist</footer>
  </div>
</body>
</html>
